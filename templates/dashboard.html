{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h2>Your Mental Health Dashboard</h2>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Mood Analysis</h5>
                        <p>How are you feeling today?</p>
                        <textarea id="moodText" class="form-control" rows="3" placeholder="Describe your mood and thoughts..."></textarea>
                        <button onclick="analyzeMood()" class="btn btn-purple mt-2">Analyze Mood</button>
                        <div id="moodResult" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Quick Chat</h5>
                        <p>Talk to your AI companion</p>
                        <a href="/ai_chat" class="btn btn-purple">Start Conversation</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
