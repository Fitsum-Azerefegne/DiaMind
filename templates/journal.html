{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h2>Mood & Glucose Journal</h2>
        
        <div class="card mt-4">
            <div class="card-body">
                <h5>New Entry</h5>
                <div class="mb-3">
                    <label class="form-label">Current Glucose Level</label>
                    <input type="number" id="glucoseLevel" class="form-control" placeholder="Enter glucose level">
                </div>
                <div class="mb-3">
                    <label class="form-label">How are you feeling?</label>
                    <textarea id="journalEntry" class="form-control" rows="4" placeholder="Describe your mood, stress levels, thoughts..."></textarea>
                </div>
                <button onclick="analyzeJournal()" class="btn btn-purple">Analyze & Save</button>
                <div id="journalResult" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
